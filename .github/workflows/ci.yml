name: CI/CD
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  backend-lint:
    name: Backend — Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linter
        run: pip install flake8
      - name: Lint backend
        run: |
          flake8 backend/app/ \
            --max-line-length=120 \
            --ignore=E501,W503,W504,E302,E303,W291,W293,E402,E221,E241,E305,W292,E265,F401,F541,E127
  frontend-check:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
  deploy-to-huggingface:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare clean deploy tree (no binary images)
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Remove all binary image files from the working tree
          find frontend/public -type f \( \
            -name "*.png" -o -name "*.jpg" -o \
            -name "*.jpeg" -o -name "*.gif" -o \
            -name "*.webp" \) -delete

          # Verify Next.js frontend structure is present
          echo "=== Frontend structure ==="
          ls frontend/pages/ || echo "WARNING: frontend/pages missing!"
          ls frontend/components/ | head -5

          # Create a fresh orphan branch with no git history
          git checkout --orphan hf-deploy
          git add -A

          # Verify what's staged
          echo "=== Staged files count ==="
          git status --short | wc -l

          git commit -m "deploy: clean snapshot for HuggingFace (no binary images)"

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_URL="https://oauth2:${HF_TOKEN}@huggingface.co/spaces/RudroBoss/Bangladesh-Legal-Advisor"
          git remote add space "$HF_URL"
          git push space hf-deploy:main --force
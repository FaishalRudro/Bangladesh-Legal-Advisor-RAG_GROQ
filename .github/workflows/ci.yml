name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend — Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install flake8

      - name: Lint backend
        run: |
          flake8 backend/main.py backend/rag_pipeline.py \
            --max-line-length=120 \
            --ignore=E501,W503,W504,E302,E303,W291,W293,E402,E221,E241,E305,W292,E265

  frontend-check:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: http://localhost:8000

  deploy-to-huggingface:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          git remote add space https://RudroBoss:$HF_TOKEN@huggingface.co/spaces/RudroBoss/Bangladesh-Legal-Advisor
          git push space main --force